<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get & Post Request</title>
</head>
<body>
    <h3>Get Request Form</h3>
    <form action="http://localhost:8080/info" method="get">
        <input type="text" name="student" placeholder="student name">
        <input type="text" name="password" placeholder="password">
        <button>Submit</button>
    </form>

    <hr>
    <h3>Post Request Form</h3>
    <form action="http://localhost:8080/info" method="post">
        <input type="text" name="employee" placeholder="employee name">
        <input type="text" name="employeeId" placeholder="emp Id">
        <button>View</button>
    </form>

    <script src="myApp.js"></script>
</body>
</html>
